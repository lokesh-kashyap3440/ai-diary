databases:
  - name: ai-diary-db
    databaseName: ai_diary
    plan: free

services:
  - type: web
    name: ai-diary-api
    runtime: node
    plan: free
    rootDir: ai-diary
    buildCommand: npm install && npm run prisma:generate && npm run build -w @ai-diary/types && npm run build -w @ai-diary/api
    startCommand: sh -c 'npx prisma db push --schema prisma/schema.prisma && npm run start -w @ai-diary/api'
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-diary-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: ai-diary-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MAGIC_LINK_TTL_MINUTES
        value: "20"
      - key: API_URL
        fromService:
          type: web
          name: ai-diary-api
          property: hostport
      - key: WEB_URL
        fromService:
          type: web
          name: ai-diary-web
          property: hostport
      - key: MAIL_FROM
        value: noreply@ai-diary.local
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "false"

  - type: web
    name: ai-diary-web
    runtime: node
    plan: free
    rootDir: ai-diary
    buildCommand: npm install && npm run build -w @ai-diary/types && npm run build -w @ai-diary/ui && npm run build -w @ai-diary/web
    startCommand: npm run start -w @ai-diary/web -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: ai-diary-api
          property: hostport
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ai-diary-api
          property: hostport
