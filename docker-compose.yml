services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-diary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_diary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_diary"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai-diary-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_diary?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/ai_diary?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      MAGIC_LINK_TTL_MINUTES: ${MAGIC_LINK_TTL_MINUTES:-20}
      WEB_URL: ${WEB_URL:-http://localhost:3002}
      API_URL: ${API_URL:-http://localhost:4000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@ai-diary.local}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: ai-diary-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_URL: ${INTERNAL_API_URL:-http://api:4000}
    ports:
      - "3002:3000"

volumes:
  postgres_data:
